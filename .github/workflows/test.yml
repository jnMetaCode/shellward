name: Tests
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npx tsx test-sdk.ts
      - run: npx tsx test-integration.ts
      - run: npx tsx test-edge-cases.ts
